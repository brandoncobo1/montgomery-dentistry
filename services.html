    /* ── PAGE HERO ───────────────────────────────────── */
    .page-hero {
      position:relative;
      background:var(--dark);
      padding:calc(var(--nav-h) + 5rem) var(--gutter) 5rem;
      overflow:hidden;
      text-align:center;
    }

      background-size:60px 60px;
      opacity:0.35;
    }
    .page-hero__glow {
      position:absolute; top:-120px; left:50%; transform:translateX(-50%);
      width:700px; height:400px;
      background:radial-gradient(ellipse,rgba(6,182,212,0.18) 0%,transparent 70%);
      pointer-events:none;
    }
    .page-hero__label {
      display:inline-block;
      font-size:0.68rem; letter-spacing:0.22em; text-transform:uppercase;
      font-weight:600; padding:6px 16px; border-radius:999px;
      background:rgba(6,182,212,0.12); color:var(--cyan-mid);
      margin-bottom:1.25rem;
    }
    .page-hero h1 {
      font-size:clamp(2.2rem,5.5vw,3.6rem);
      font-weight:800; letter-spacing:-0.03em; line-height:1.1;
      color:#fff; margin-bottom:1.25rem;

    .page-hero__sub {

      max-width:600px; margin:0 auto;

    .svc-card {

      border-radius:var(--radius-lg);

      border-color:var(--cyan);

    .svc-card__icon {

    .svc-card__icon svg { stroke:#fff; fill:none; }
    .svc-card__header { display:flex; align-items:flex-start; gap:1rem; }
    .svc-card__title {
      font-size:1.05rem; font-weight:700; color:var(--dark); line-height:1.3;

    .svc-card__price {

    .process-step__title {
      font-size:1rem; font-weight:700; color:#fff; margin-bottom:0.5rem;

    .process-step__desc {

    }

      background:#fff; border:1px solid var(--border);
      border-radius:var(--radius-lg); overflow:hidden;
    }
    .pricing-row {
      display:flex; align-items:center; justify-content:space-between;
      padding:1rem 1.5rem;
      border-bottom:1px solid var(--border);
      transition:background 0.2s;
    }
    .pricing-row:last-child { border-bottom:none; }
    .pricing-row:hover { background:var(--cream); }
    .pricing-row__name {
      font-size:0.9rem; color:var(--ink); font-weight:500;
    }
    .pricing-row__price {
      font-size:0.9rem; font-weight:700; color:var(--cyan);

    }
    .pricing-row__price--free { color:#16a34a; }
    .pricing-note {
      text-align:center; font-size:0.8rem; color:var(--ink-light);
      margin-top:1rem; font-style:italic;
    }
    .pricing-cta {
      text-align:center; margin-top:2rem;
    }

    /* ── CTA STRIP ───────────────────────────────────── */
    .cta-strip {
      background:var(--dark);
      padding:clamp(4rem,8vw,6rem) var(--gutter);
      text-align:center;

// ── Nav scroll behaviour ─────────────────────────────────
(function() {

  }
  window.addEventListener('scroll', onScroll, { passive:true });
  onScroll();
})();

// ── Reveal intersection observer ─────────────────────────
function initReveal() {
  var els = document.querySelectorAll('.reveal,.reveal-left,.reveal-right,.reveal-scale');
  if (!els.length) return;
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (e.isIntersecting) {
        e.target.classList.add('active');
        obs.unobserve(e.target);
      }
    });
  }, { threshold:0.1, rootMargin:'0px 0px -30px 0px' });
  els.forEach(function(el) {
    if (!el.classList.contains('active')) obs.observe(el);
  });
}

var menuOpen = false;
function toggleMenu() {
  menuOpen = !menuOpen;
  var menu = document.getElementById('mobile-menu');
  var hb = document.getElementById('hamburger');
  var h1 = document.getElementById('hb1');
  var h2 = document.getElementById('hb2');
  var h3 = document.getElementById('hb3');
  if (menuOpen) {
    menu.classList.add('open');
    hb.setAttribute('aria-expanded','true');
    h1.style.transform='rotate(45deg) translate(5px,5px)';
    h2.style.opacity='0';
    h3.style.transform='rotate(-45deg) translate(5px,-5px)';
    h3.style.width='22px'; h3.style.marginLeft='0';
  } else {
    closeMenu();
  }
}
function closeMenu() {
  menuOpen = false;
  var menu = document.getElementById('mobile-menu');
  var hb = document.getElementById('hamburger');
  var h1 = document.getElementById('hb1');
  var h2 = document.getElementById('hb2');
  var h3 = document.getElementById('hb3');
  menu.classList.remove('open');
  hb.setAttribute('aria-expanded','false');
  h1.style.transform='none';
  h2.style.opacity='1';
  h3.style.transform='none';
  h3.style.width='16px'; h3.style.marginLeft='auto';
}

// ── Init ──────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  renderPage();
  // Nav always scrolled since page has dark bg
  document.getElementById('nav').classList.add('scrolled');
  // Trigger hero reveals immediately
  setTimeout(function() {
    document.querySelectorAll('.page-hero .reveal,.page-hero .reveal-left,.page-hero .reveal-right,.page-hero .reveal-scale').forEach(function(el) {
      el.classList.add('active');
    });
  }, 100);
  // WA float
  var waFloat = document.getElementById('wa-float');
  if (waFloat) {
    setTimeout(function() { waFloat.classList.add('show'); }, 1200);
    setTimeout(function() { waFloat.classList.add('pulse'); }, 2200);
  }
  // Observe all reveals
  initReveal();
});
</script>
